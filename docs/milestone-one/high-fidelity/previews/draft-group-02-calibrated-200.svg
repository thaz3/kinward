<svg xmlns="http://www.w3.org/2000/svg" width="3220" height="2300" viewBox="0 0 3220 2300" role="img" aria-labelledby="title desc"><title id="title">Group two calibrated 200 percent text evidence</title><desc id="desc">Seven delegation frames with 56, 44, 36, and 32 pixel roles, full-row selection cards, wrapping, explicit white focus separation, and stacked actions.</desc><rect width="3220" height="2300" fill="#F7F6F2"/><text x="40" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#20312A">Static design evidence representing a calibrated 200% text-size relationship. Runtime conformance requires later implementation testing.</text><defs><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:56px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:44px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:32px;fill:#4C5F56}.ws{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;fill:#FFFFFF}.w{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;font-weight:700;fill:#FFF}.p{fill:#FFF;stroke:#4C5F56;stroke-width:3}.c{fill:#F7F6F2;stroke:#4C5F56;stroke-width:3}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.q{fill:#17634D;}.f{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}.danger{fill:#FFF;stroke:#A33A3A;stroke-width:3}</style></defs>
<g transform="translate(40 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 19 · Form</text><text class="h" x="24" y="140">Choose</text><text class="h" x="24" y="206">representative</text><rect class="selected" x="24" y="270" width="382" height="420" rx="18"/><text class="b" x="46" y="336">✓ Riley selected</text><text class="s" x="46" y="402">Only confirmed</text><text class="s" x="46" y="444">scopes.</text><text class="s" x="46" y="506">Not ownership or</text><text class="s" x="46" y="548">legal authority.</text><text class="s" x="46" y="610">Recorded and</text><text class="s" x="46" y="652">revocable.</text><text class="s" x="24" y="760">! Select eligible adult</text><text class="s" x="24" y="810">! System error · Retry</text><rect class="q" x="24" y="880" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="76" y="942">Continue to</text><text class="w" fill="#FFFFFF" x="76" y="986">scope</text><rect class="c" x="24" y="1060" width="382" height="120" rx="14"/><text class="b" x="140" y="1134">Cancel</text></g>
<g transform="translate(490 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 20 · Scope</text><text class="h" x="24" y="140">Choose exact</text><text class="h" x="24" y="206">scope</text><rect class="f" x="19" y="260" width="392" height="300" rx="22"/><rect class="sep" x="23" y="264" width="384" height="292" rx="20"/><rect class="selected" x="26" y="267" width="378" height="286" rx="18"/><text class="b" x="46" y="330">✓ Manage</text><text class="b" x="46" y="376">approved roles</text><text class="s" x="46" y="450">Selected · Dad only</text><text class="s" x="46" y="500">Reason recorded.</text><rect class="c" x="24" y="600" width="382" height="280" rx="18"/><text class="b" x="46" y="670">Review</text><text class="b" x="46" y="716">permissions</text><text class="s" x="46" y="790">Not selected ·</text><text class="s" x="46" y="834">remains denied.</text><text class="s" x="24" y="940">! Select at least one</text><text class="s" x="24" y="990">exact scope</text><rect x="24" y="1040" width="382" height="142" rx="14" fill="#E9EEF0" stroke="#4C5F56" stroke-width="3"/><text class="b" x="56" y="1100" fill="#4C5F56">Continue disabled</text><text class="s" x="56" y="1150" fill="#4C5F56">until a scope is chosen</text><rect class="c" x="24" y="1220" width="382" height="120" rx="14"/><text class="b" x="164" y="1294">Back</text></g>
<g transform="translate(940 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 21 · Duration</text><text class="h" x="24" y="140">Choose</text><text class="h" x="24" y="206">duration</text><rect class="f" x="19" y="250" width="392" height="280" rx="22"/><rect class="sep" x="23" y="254" width="384" height="272" rx="20"/><rect class="selected" x="26" y="257" width="378" height="266" rx="18"/><text class="h2" x="46" y="320">✓ 90 days</text><text class="b" x="46" y="380">Selected</text><text class="s" x="46" y="450">Suggested · ends</text><text class="s" x="46" y="494">about Jul 16</text><rect class="c" x="24" y="570" width="382" height="220" rx="18"/><text class="h2" x="46" y="640">Custom date</text><text class="s" x="46" y="710">Month / day /</text><text class="s" x="46" y="754">year format</text><rect class="c" x="24" y="820" width="382" height="280" rx="18"/><text class="h2" x="46" y="890">Until revoked</text><text class="s" x="46" y="970">Opens Screen 22</text><text class="s" x="46" y="1014">Includes recurring</text><text class="s" x="46" y="1058">90-day review.</text><text class="s" x="24" y="1160">! Choose an option</text><rect class="q" x="24" y="1220" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="62" y="1282">Review</text><text class="w" fill="#FFFFFF" x="62" y="1326">delegation</text><rect class="c" x="24" y="1400" width="382" height="120" rx="14"/><text class="b" x="164" y="1474">Back</text></g>
<g transform="translate(1390 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 22 · Confirm</text><text class="h" x="24" y="140">Until</text><text class="h" x="24" y="206">revoked</text><rect class="c" x="24" y="270" width="382" height="570" rx="18"/><text class="b" x="46" y="336">No fixed expiry.</text><text class="s" x="46" y="402">Review every</text><text class="s" x="46" y="444">90 days.</text><text class="s" x="46" y="506">No automatic</text><text class="s" x="46" y="548">access change.</text><text class="s" x="46" y="610">No external</text><text class="s" x="46" y="652">notification.</text><text class="s" x="46" y="714">Dad stays owner.</text><rect class="q" x="24" y="900" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="65" y="962">Confirm until</text><text class="w" fill="#FFFFFF" x="65" y="1006">revoked</text></g>
<g transform="translate(1840 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 23 · Detail</text><text class="h" x="24" y="140">Delegation</text><text class="h" x="24" y="206">detail</text><rect class="c" x="24" y="270" width="382" height="560" rx="18"/><text class="s" x="46" y="330">REPRESENTATIVE</text><text class="b" x="46" y="390">Riley Chen-</text><text class="b" x="46" y="436">Washington</text><text class="s" x="46" y="500">STATUS</text><text class="b" x="46" y="560">Active · Review</text><text class="b" x="46" y="606">due</text><text class="s" x="46" y="670">NEXT REVIEW</text><text class="b" x="46" y="730">July 16</text><text class="s" x="46" y="790">Grant ID masked</text><rect class="q" x="24" y="880" width="382" height="120" rx="14"/><text class="w" fill="#FFFFFF" x="140" y="954">Modify</text><rect class="c" x="24" y="1030" width="382" height="120" rx="14"/><text class="b" x="130" y="1104">Suspend</text><rect class="danger" x="24" y="1180" width="382" height="120" rx="14"/><text x="150" y="1254" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#A33A3A">Revoke</text><text class="s" x="24" y="1380">⊘ Information</text><text class="s" x="24" y="1424">unavailable</text></g>
<g transform="translate(2290 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 25 · Suspend</text><text class="h" x="24" y="140">Suspend</text><text class="h" x="24" y="206">access?</text><text class="b" x="24" y="286">Permissions for Dad</text><text class="b" x="24" y="332">stop immediately.</text><text class="s" x="24" y="402">History is preserved.</text><text class="s" x="24" y="450">No authority is added.</text><text class="s" x="24" y="520">◷ Suspending…</text><text class="s" x="24" y="570">! Couldn’t suspend</text><rect class="q" x="24" y="640" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="70" y="702">Suspend</text><text class="w" fill="#FFFFFF" x="70" y="746">access</text><rect class="f" x="19" y="830" width="392" height="154" rx="20"/><rect class="sep" x="23" y="834" width="384" height="146" rx="18"/><rect class="c" x="26" y="837" width="378" height="140" rx="14"/><text class="b" x="90" y="900">Keep access</text><text class="b" x="90" y="944">(safe default)</text></g>
<g transform="translate(2740 130)"><rect class="p" width="430" height="2080" rx="28"/><text class="s" x="24" y="62">Screen 26 · Revoke</text><text class="h" x="24" y="140">Revoke</text><text class="h" x="24" y="206">access?</text><text class="b" x="24" y="286">This permanently</text><text class="b" x="24" y="332">ends this grant.</text><text class="s" x="24" y="402">History remains</text><text class="s" x="24" y="444">filtered.</text><text class="s" x="24" y="520">◷ Revoking…</text><text class="s" x="24" y="570">! Couldn’t revoke</text><rect class="f" x="19" y="640" width="392" height="154" rx="20"/><rect class="sep" x="23" y="644" width="384" height="146" rx="18"/><rect class="q" x="26" y="647" width="378" height="140" rx="14"/><text class="w" fill="#FFFFFF" x="90" y="734">Keep access</text><rect class="danger" x="24" y="840" width="382" height="142" rx="14"/><text x="82" y="926" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#A33A3A">Revoke access</text></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="8050" viewBox="0 0 1800 8050" role="img" aria-labelledby="title desc">
<title id="title">Kinward Batch One static 200-percent text-resize evidence</title>
<desc id="desc">All seven Batch One screens use direct two-times text roles on the same narrow frame width as the standard board: 36 pixel body, 32 pixel supporting text and labels, 44 pixel section headings, and 56 pixel page headings. Content grows vertically with stacked controls, complete labels, no clipping, and no horizontal scrolling. Static design evidence only, not runtime conformance.</desc>
<defs><style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;fill:#20312A}.bg{fill:#ECEFEA}.phone{fill:#F7F6F2;stroke:#20312A;stroke-width:5}.decor{fill:#FFF;stroke:#C9D2CD;stroke-width:3}.control{fill:#FFF;stroke:#4C5F56;stroke-width:3}.primary{fill:#17634D}.ctx{fill:#DCECE6}.info{fill:#E2F0F8}.warn{fill:#FFF1C7}.neutral{fill:#E9EEF0}.danger{fill:#FFF;stroke:#A33A3A;stroke-width:3}.focus{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFF;stroke-width:2}.h1{font-size:56px;font-weight:700}.h2{font-size:44px;font-weight:700}.body{font-size:36px}.support{font-size:32px;fill:#4C5F56}.label{font-size:32px;font-weight:700}.white{fill:#FFF}.red{fill:#A33A3A}.blue{fill:#155E8A}.cap{font-size:24px;font-weight:700}.title{font-size:48px;font-weight:700}.sub{font-size:24px;fill:#4C5F56}
</style></defs>
<rect class="bg" width="1800" height="8050"/>
<text class="title" x="55" y="65">Batch 01  -  calibrated 200% text-resize evidence</text>
<text class="sub" x="55" y="106">Same 520-unit narrow frame width as standard  -  exact 2x text roles  -  static design evidence, not runtime conformance</text>
<text class="sub" x="55" y="140">Body 36  -  supporting 32  -  labels 32  -  section headings 44  -  page headings 56  -  controls grow and stack</text>

<!-- Screen 2 -->
<g transform="translate(55 215)"><text class="cap" y="-18">SCREEN 2  -  EMAIL VERIFICATION  -  200%</text><rect class="phone" rx="28" width="520" height="2280"/>
<text class="h1" x="24" y="82">Verify your</text><text class="h1" x="24" y="148">email</text>
<text class="body" x="24" y="218">We sent a code to</text><text class="label" x="24" y="270">a"""@example.test</text>
<rect class="warn" x="24" y="315" rx="18" width="472" height="180"/><text class="h2" x="48" y="375">  Waiting for</text><text class="h2" x="48" y="427">verification</text><text class="support" x="48" y="475">No timer is required.</text>
<text class="label" x="24" y="560">Verification code</text><rect class="control" x="24" y="585" rx="14" width="472" height="104"/><text class="body" x="48" y="650">123 456</text>
<rect class="focus" x="19" y="735" rx="19" width="482" height="114"/><rect class="sep" x="23" y="739" rx="17" width="474" height="106"/><rect class="primary" x="26" y="742" rx="14" width="468" height="100"/><text class="label white" x="161" y="806">Verify email</text>
<rect class="control" x="24" y="900" rx="14" width="472" height="104"/><text class="label blue" x="154" y="965">Resend code</text>
<rect class="control" x="24" y="1050" rx="14" width="472" height="104"/><text class="label" x="149" y="1115">Change email</text>
<rect class="neutral" x="24" y="1215" rx="18" width="472" height="300"/><text class="h2" x="48" y="1275">  Privacy boundary</text><text class="body" x="48" y="1340">No Circle information</text><text class="body" x="48" y="1386">is shown before</text><text class="body" x="48" y="1432">verification succeeds.</text><text class="support" x="48" y="1490">Verified email only.</text>
<text class="body" x="24" y="1605">Complete action names</text><text class="body" x="24" y="1651">stack vertically.</text><text class="support" x="24" y="1725">Visible focus: 3 px violet ring</text><text class="support" x="24" y="1767">plus 2 px white separation.</text><text class="support" x="24" y="1850">Content continues by vertical scroll.</text><text class="support" x="24" y="1892">No clipping or</text><text class="support" x="24" y="1934">horizontal scrolling.</text></g>

<!-- Screen 4 + confirmation -->
<g transform="translate(640 215)"><text class="cap" y="-18">SCREEN 4  -  CREATE CIRCLE  -  200%</text><rect class="phone" rx="28" width="520" height="2280"/>
<rect class="neutral" x="20" y="20" rx="16" width="480" height="135"/><text class="label" x="42" y="78">New Circle</text><text class="support" x="42" y="127">Not created</text>
<text class="h1" x="24" y="235">Create a Family</text><text class="h1" x="24" y="301">Circle</text>
<text class="label" x="24" y="380">Circle name</text><rect class="control" x="24" y="405" rx="14" width="472" height="104"/><text class="body" x="48" y="470">Harbor Circle</text>
<rect class="info" x="24" y="555" rx="18" width="472" height="300"/><text class="h2" x="48" y="615">  Circle Head</text><text class="h2" x="48" y="667">boundary</text><text class="body" x="48" y="730">You become the first</text><text class="body" x="48" y="776">Circle Head. This grants</text><text class="body" x="48" y="822">no Care Recipient access.</text>
<rect class="primary" x="24" y="905" rx="14" width="472" height="104"/><text class="label white" x="144" y="970">Create Circle</text>
<rect class="control" x="24" y="1055" rx="14" width="472" height="104"/><text class="label" x="198" y="1120">Cancel</text>
<text class="h2" x="24" y="1205">After input,</text><text class="h2" x="24" y="1257">Cancel opens:</text>
<rect class="decor" x="24" y="1290" rx="20" width="472" height="835"/><text class="h2" x="48" y="1355">Discard this</text><text class="h2" x="48" y="1407">unsubmitted Circle?</text><text class="body" x="48" y="1475">The Circle name and</text><text class="body" x="48" y="1521">any settings you entered</text><text class="body" x="48" y="1567">will be lost.</text><text class="support" x="48" y="1630">No Circle has been created.</text>
<rect class="focus" x="43" y="1685" rx="19" width="434" height="114"/><rect class="sep" x="47" y="1689" rx="17" width="426" height="106"/><rect class="primary" x="50" y="1692" rx="14" width="420" height="100"/><text class="label white" x="137" y="1756">Keep editing</text>
<rect class="danger" x="48" y="1845" rx="14" width="424" height="104"/><text class="label red" x="124" y="1910">Discard draft</text><text class="support" x="48" y="2010">Safe action is initially focused.</text><text class="support" x="48" y="2052">Closing returns focus to Cancel.</text></g>

<!-- Screen 6 -->
<g transform="translate(1225 215)"><text class="cap" y="-18">SCREEN 6  -  INVITE  -  200%</text><rect class="phone" rx="28" width="520" height="2280"/>

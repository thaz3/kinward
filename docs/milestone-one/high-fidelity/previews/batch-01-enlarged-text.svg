<rect class="warn" x="24" y="575" rx="18" width="472" height="180"/><text class="h2" x="48" y="635">  Expires after</text><text class="h2" x="48" y="687">seven days</text><text class="support" x="48" y="735">No access before acceptance.</text>
<text class="h2" x="24" y="835">Access offered</text><rect class="decor" x="24" y="870" rx="18" width="472" height="555"/><text class="label" x="48" y="930">Circle membership</text><text class="body" x="48" y="985">Harbor Circle</text><text class="body" x="48" y="1031">Family Coordinator</text><text class="support" x="48" y="1085">Circle-wide coordination</text><text class="support" x="48" y="1127">grants no recipient access.</text><text class="label" x="48" y="1200">Care Recipient access</text><text class="body" x="48" y="1255">Dad  -  Care Lead only</text><text class="support" x="48" y="1310">No other Care Recipient</text><text class="support" x="48" y="1352">is included.</text>
<rect class="info" x="24" y="1470" rx="18" width="472" height="330"/><text class="h2" x="48" y="1530">Not granted</text><text class="body" x="48" y="1590">Ownership, management,</text><text class="body" x="48" y="1636">delegation, or unlisted</text><text class="body" x="48" y="1682">Care Recipient access.</text><text class="support" x="48" y="1740">Relationship alone grants</text><text class="support" x="48" y="1782">no authority.</text>
<rect class="primary" x="24" y="1845" rx="14" width="472" height="135"/><text class="label white" x="125" y="1905">Review invitation</text><text class="support white" x="96" y="1950">Review before sending</text>
<rect class="control" x="24" y="2030" rx="14" width="472" height="104"/><text class="label" x="198" y="2095">Cancel</text><text class="support" x="24" y="2190">Membership-only path</text><text class="support" x="24" y="2232">is excluded.</text></g>

<!-- Screen 7 + confirmation -->
<g transform="translate(55 2705)"><text class="cap" y="-18">SCREEN 7  -  PENDING + CANCEL  -  200%</text><rect class="phone" rx="28" width="520" height="2460"/>
<rect class="ctx" x="20" y="20" rx="16" width="480" height="125"/><text class="label" x="42" y="78">Circle  -  Harbor Circle</text><text class="support" x="42" y="125">Circle-wide</text>
<text class="h1" x="24" y="225">Invitation</text><text class="h1" x="24" y="291">pending</text>
<rect class="warn" x="24" y="335" rx="18" width="472" height="190"/><text class="h2" x="48" y="395">  Pending</text><text class="body" x="48" y="455">No active authority</text><text class="body" x="48" y="501">before acceptance.</text>
<rect class="decor" x="24" y="570" rx="18" width="472" height="720"/><text class="label" x="48" y="630">Invitation recipient</text><text class="body" x="48" y="685">j"""@example.test</text><text class="label" x="48" y="765">Created</text><text class="body" x="48" y="820">July 16, 2026</text><text class="label" x="48" y="900">Expires</text><text class="body" x="48" y="955">July 23, 2026</text><text class="label" x="48" y="1035">Access offered</text><text class="body" x="48" y="1090">Family Coordinator</text><text class="body" x="48" y="1136">Harbor Circle-wide</text><text class="support" x="48" y="1200">No Care Recipient access.</text><text class="support" x="48" y="1242">No access until accepted.</text>
<rect class="control" x="24" y="1335" rx="14" width="472" height="120"/><text class="label blue" x="118" y="1408">Resend invitation</text>

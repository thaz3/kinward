<rect class="focus" x="43" y="1915" rx="19" width="434" height="114"/><rect class="sep" x="47" y="1919" rx="17" width="426" height="106"/><rect class="primary" x="50" y="1922" rx="14" width="420" height="100"/><text class="label white" x="114" y="1986">Keep invitation</text>
<rect class="danger" x="48" y="2075" rx="14" width="424" height="104"/><text class="label red" x="105" y="2140">Cancel invitation</text><text class="support" x="48" y="2245">Safe action is initially focused.</text><text class="support" x="24" y="2355">All dates and action</text><text class="support" x="24" y="2397">names are complete.</text></g>

<!-- Screen 8 -->
<g transform="translate(640 2705)"><text class="cap" y="-18">SCREEN 8  -  PROPOSE RECIPIENT  -  200%</text><rect class="phone" rx="28" width="520" height="2460"/>
<rect class="ctx" x="20" y="20" rx="16" width="480" height="125"/><text class="label" x="42" y="78">Circle  -  Harbor Circle</text><text class="support" x="42" y="125">Circle-wide</text>
<text class="h1" x="24" y="225">Add a Care</text><text class="h1" x="24" y="291">Recipient</text>

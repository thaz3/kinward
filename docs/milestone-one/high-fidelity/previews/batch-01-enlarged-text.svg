<rect x="24" y="535" rx="16" width="472" height="230" fill="#DCECE6" stroke="#17634D" stroke-width="3"/><text class="h2" x="48" y="605">  Propose another</text><text class="h2" x="86" y="657">adult</text><text class="body" x="86" y="720">Selected</text>
<text class="label" x="24" y="845">Owner verified email</text><rect class="control" x="24" y="875" rx="14" width="472" height="145"/><text class="body" x="48" y="940">r"""@</text><text class="body" x="48" y="986">example.test</text>
<rect class="info" x="24" y="1070" rx="18" width="472" height="500"/><text class="h2" x="48" y="1130">  Sole ownership</text><text class="body" x="48" y="1200">No private Care Recipient</text><text class="body" x="48" y="1246">information may be entered</text><text class="body" x="48" y="1292">before the owner accepts.</text><text class="body" x="48" y="1360">Circle Head status and</text><text class="body" x="48" y="1406">family relationship grant</text><text class="body" x="48" y="1452">no private access.</text><text class="support" x="48" y="1520">No pending shell exists yet.</text>
<rect class="primary" x="24" y="1630" rx="14" width="472" height="170"/><text class="label white" x="99" y="1693">Send ownership</text><text class="label white" x="146" y="1737">invitation</text><text class="support white" x="95" y="1780">Review before sending</text>
<rect class="control" x="24" y="1850" rx="14" width="472" height="104"/><text class="label" x="198" y="1915">Cancel</text>
<rect class="neutral" x="24" y="2020" rx="18" width="472" height="260"/><text class="h2" x="48" y="2080">Privacy boundary</text><text class="body" x="48" y="2145">No diagnosis, schedule,</text><text class="body" x="48" y="2191">care, or medical details.</text><text class="support" x="48" y="2250">Content grows vertically.</text><text class="support" x="24" y="2355">Complete labels;</text><text class="support" x="24" y="2397">no horizontal scrolling.</text></g>

<!-- Screen 9 -->
<g transform="translate(1225 2705)"><text class="cap" y="-18">SCREEN 9  -  OWNERSHIP INVITE  -  200%</text><rect class="phone" rx="28" width="520" height="2460"/>
<rect class="neutral" x="20" y="20" rx="16" width="480" height="170"/><text class="label" x="42" y="78">Identity checked first</text><text class="support" x="42" y="127">No details before the</text><text class="support" x="42" y="169">matching email is verified.</text>
<text class="h1" x="24" y="275">Ownership</text><text class="h1" x="24" y="341">invitation</text>
<rect class="ctx" x="24" y="385" rx="16" width="472" height="170"/><text class="label" x="48" y="445">+ Email verified</text><text class="body" x="48" y="505">Harbor Circle</text>
<text class="body" x="24" y="625">Avery proposed you</text><text class="body" x="24" y="671">as sole owner of "Dad."</text>
<rect class="info" x="24" y="725" rx="18" width="472" height="1150"/><text class="h2" x="48" y="790">Before you decide</text>
<text class="body" x="48" y="860">+ You become the sole</text><text class="body" x="80" y="906">owner of this profile.</text><text class="support" x="80" y="952">Avery does not remain</text><text class="support" x="80" y="994">an owner.</text>
<text class="body" x="48" y="1065">+ You control who gets</text><text class="body" x="80" y="1111">access and may manage</text><text class="body" x="80" y="1157">or revoke it.</text>
<text class="body" x="48" y="1228">+ Family relationship alone</text><text class="body" x="80" y="1274">grants no authority.</text>
<text class="body" x="48" y="1345">+ Your consent is required</text><text class="body" x="80" y="1391">before private information</text><text class="body" x="80" y="1437">becomes available.</text>
<text class="body" x="48" y="1508">+ Acceptance activates sole</text><text class="body" x="80" y="1554">ownership and required</text><text class="body" x="80" y="1600">Circle membership together.</text>
<text class="support" x="48" y="1680">No joint ownership.</text><text class="support" x="48" y="1722">No second ordinary invitation.</text><text class="support" x="48" y="1764">No private data</text><text class="support" x="48" y="1806">before acceptance.</text>
<rect class="primary" x="24" y="1930" rx="14" width="472" height="120"/><text class="label white" x="113" y="2003">Review and accept</text>
<rect class="danger" x="24" y="2100" rx="14" width="472" height="104"/><text class="label red" x="184" y="2165">Decline</text>
<rect class="control" x="24" y="2250" rx="14" width="472" height="104"/><text class="label" x="142" y="2315">Return safely</text><text class="support" x="24" y="2390">Complete consequences</text><text class="support" x="24" y="2432">remain readable.</text></g>


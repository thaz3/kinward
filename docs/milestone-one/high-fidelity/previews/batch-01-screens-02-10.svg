<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="3150" viewBox="0 0 1800 3150" role="img" aria-labelledby="title desc">
<title id="title">Kinward high-fidelity expansion batch one</title><desc id="desc">Static standard-mobile evidence for draft Screens 2, 4, 6, 7, 8, 9, and 10. Not product-owner approved and not implementation.</desc>
<defs><style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;fill:#20312A}.bg{fill:#ECEFEA}.phone{fill:#F7F6F2;stroke:#20312A;stroke-width:4}.decor{fill:#FFF;stroke:#C9D2CD;stroke-width:2}.control{fill:#FFF;stroke:#4C5F56;stroke-width:2}.primary{fill:#17634D}.ctx{fill:#DCECE6}.info{fill:#E2F0F8}.warn{fill:#FFF1C7}.neutral{fill:#E9EEF0}.danger{fill:#FFF;stroke:#A33A3A;stroke-width:2}.focus{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFF;stroke-width:2}.h1{font-size:28px;font-weight:700}.h2{font-size:22px;font-weight:700}.body{font-size:18px}.support{font-size:16px;fill:#4C5F56}.label{font-size:16px;font-weight:700}.white{fill:#FFF}.red{fill:#A33A3A}.blue{fill:#155E8A}.cap{font-size:16px;font-weight:700}.title{font-size:44px;font-weight:700}.sub{font-size:22px;fill:#4C5F56}</style></defs>
<rect class="bg" width="1800" height="3150"/><text class="title" x="60" y="66">Kinward · high-fidelity expansion · Batch 01</text><text class="sub" x="60" y="105">Draft Screens 2, 4, 6, 7, 8, 9, 10 · static design review evidence · not product-owner approved</text>

<g transform="translate(55 160)"><text class="cap" y="-14">SCREEN 2 · EMAIL VERIFICATION</text><rect class="phone" rx="28" width="520" height="850"/><text class="h2" x="28" y="54">◖ Kinward</text><text class="h1" x="28" y="112">Verify your email</text><text class="body" x="28" y="150">We sent a code to</text><text class="label" x="28" y="180">a•••@example.test</text><rect class="warn" x="24" y="210" rx="14" width="472" height="66"/><text class="body" x="46" y="250">◷ Waiting for verification</text><text class="label" x="28" y="320">Verification code</text><rect class="control" x="28" y="338" rx="12" width="464" height="60"/><text class="body" x="48" y="375">123 456</text><rect class="focus" x="23" y="425" rx="17" width="474" height="70"/><rect class="sep" x="27" y="429" rx="15" width="466" height="62"/><rect class="primary" x="30" y="432" rx="12" width="460" height="56"/><text class="label white" x="213" y="467">Verify email</text><rect class="control" x="28" y="520" rx="12" width="220" height="56"/><text class="label blue" x="90" y="555">Resend code</text><rect class="control" x="272" y="520" rx="12" width="220" height="56"/><text class="label" x="329" y="555">Change email</text><text class="support" x="28" y="640">No Circle information is shown.</text><text class="support" x="28" y="670">Verified email is the only identity channel.</text></g>

<g transform="translate(640 160)"><text class="cap" y="-14">SCREEN 4 · CREATE FAMILY CIRCLE</text><rect class="phone" rx="28" width="520" height="850"/><rect class="neutral" x="20" y="20" rx="14" width="480" height="64"/><text class="label" x="40" y="58">New Circle · Not created</text><text class="h1" x="24" y="140">Create a Family Circle</text><text class="label" x="24" y="190">Circle name</text><rect class="control" x="24" y="208" rx="12" width="472" height="60"/><text class="body" x="44" y="245">Harbor Circle</text><rect class="info" x="24" y="290" rx="14" width="472" height="135"/><text class="h2" x="46" y="330">ⓘ Circle Head boundary</text><text class="body" x="46" y="365">You become the first Circle Head.</text><text class="body" x="46" y="397">This grants no Care Recipient access.</text><rect class="primary" x="24" y="455" rx="12" width="472" height="58"/><text class="label white" x="201" y="491">Create Circle</text><rect class="control" x="24" y="535" rx="12" width="472" height="58"/><text class="label" x="231" y="571">Cancel</text><rect class="warn" x="24" y="620" rx="14" width="472" height="125"/><text class="h2" x="46" y="658">Unsaved input</text><text class="body" x="46" y="692">Cancel after changes asks before leaving.</text><text class="support" x="46" y="722">Keep editing is the safe default.</text><text class="support" x="24" y="790">No Circle exists unless creation succeeds.</text></g>

<g transform="translate(1225 160)"><text class="cap" y="-14">SCREEN 6 · INVITE ADULT</text><rect class="phone" rx="28" width="520" height="850"/><rect class="ctx" x="20" y="20" rx="14" width="480" height="58"/><text class="label" x="40" y="56">Circle · Harbor Circle · Circle-wide setup</text><text class="h1" x="24" y="125">Invite an adult</text><text class="label" x="24" y="165">Invitation recipient · verified email</text><rect class="control" x="24" y="180" rx="12" width="472" height="56"/><text class="body" x="44" y="215">jordan@example.test</text><rect class="warn" x="24" y="255" rx="12" width="472" height="56"/><text class="label" x="44" y="290">◷ Expires seven days after sending</text><text class="h2" x="24" y="355">Access preview</text><rect class="decor" x="24" y="375" rx="14" width="472" height="275"/><text class="label" x="46" y="410">Circle membership and access offered</text><text class="body" x="46" y="442">✓ Harbor · Family Coordinator · Circle-wide</text><text class="support" x="46" y="470">Circle-wide coordination grants no recipient access.</text><text class="label" x="46" y="510">Care Recipient access offered</text><text class="body" x="46" y="542">✓ Dad · Care Lead only</text><text class="label" x="46" y="580">Not included</text><text class="support" x="46" y="608">Other recipients, ownership, management, delegation.</text><text class="support" x="46" y="634">Family relationship alone grants no authority.</text><rect class="primary" x="24" y="680" rx="12" width="472" height="58"/><text class="label white" x="190" y="716">Review invitation</text><text class="support" x="24" y="770">Review recipient and exact access before sending.</text><text class="support" x="24" y="800">No access begins before verified-email acceptance.</text></g>

<g transform="translate(55 1085)"><text class="cap" y="-14">SCREEN 7 · PENDING INVITATION</text><rect class="phone" rx="28" width="520" height="850"/><rect class="ctx" x="20" y="20" rx="14" width="480" height="58"/><text class="label" x="40" y="56">Circle · Harbor Circle · Circle-wide</text><text class="h1" x="24" y="125">Invitation pending</text><rect class="warn" x="24" y="150" rx="14" width="472" height="72"/><text class="h2" x="46" y="194">◷ Pending · No active authority</text><rect class="decor" x="24" y="245" rx="14" width="472" height="340"/><text class="support" x="46" y="280">INVITATION RECIPIENT</text><text class="body" x="46" y="310">j•••@example.test</text><text class="support" x="46" y="348">CREATED</text><text class="body" x="46" y="378">July 16, 2026</text><text class="support" x="46" y="416">EXPIRES</text><text class="body" x="46" y="446">July 23, 2026</text><text class="support" x="46" y="484">ACCESS OFFERED</text><text class="body" x="46" y="514">Family Coordinator · Harbor Circle-wide</text><text class="support" x="46" y="548">No Care Recipient access · none before acceptance</text><rect class="primary" x="24" y="615" rx="12" width="472" height="58"/><text class="label white" x="184" y="651">Resend invitation</text><rect class="danger" x="24" y="695" rx="12" width="472" height="58"/><text class="label red" x="190" y="731">Cancel invitation</text><rect class="control" x="24" y="775" rx="12" width="472" height="58"/><text class="label" x="196" y="811">Back to members</text></g>

<g transform="translate(640 1085)"><text class="cap" y="-14">SCREEN 8 · PROPOSE CARE RECIPIENT</text><rect class="phone" rx="28" width="520" height="850"/><rect class="ctx" x="20" y="20" rx="14" width="480" height="76"/><text class="support" x="40" y="48">CIRCLE · Harbor Circle</text><text class="label" x="40" y="77">Care Recipient · Circle-wide</text><text class="h1" x="24" y="145">Add a Care Recipient</text><rect class="control" x="24" y="180" rx="14" width="472" height="64"/><text class="body" x="46" y="219">○ Add myself</text><rect x="24" y="260" rx="14" width="472" height="72" fill="#DCECE6" stroke="#17634D" stroke-width="3"/><text class="body" x="46" y="303">◉ Propose another adult · Selected</text><text class="label" x="24" y="375">Owner verified email</text><rect class="control" x="24" y="392" rx="12" width="472" height="58"/><text class="body" x="44" y="428">r•••@example.test</text><rect class="info" x="24" y="480" rx="14" width="472" height="135"/><text class="h2" x="46" y="520">ⓘ Sole ownership</text><text class="body" x="46" y="555">No private information may be entered</text><text class="body" x="46" y="585">before the owner accepts.</text><rect class="primary" x="24" y="645" rx="12" width="472" height="58"/><text class="label white" x="164" y="681">Send ownership invitation</text><rect class="control" x="24" y="725" rx="12" width="472" height="58"/><text class="label" x="231" y="761">Cancel</text></g>

<g transform="translate(1225 1085)"><text class="cap" y="-14">SCREEN 9 · OWNERSHIP INVITATION</text><rect class="phone" rx="28" width="520" height="850"/><rect class="neutral" x="20" y="20" rx="14" width="480" height="58"/><text class="label" x="40" y="56">Invitation shell · Identity checked first</text><text class="h1" x="24" y="125">Ownership invitation</text><rect class="ctx" x="24" y="145" rx="14" width="472" height="52"/><text class="label" x="46" y="178">✓ Email verified · Harbor Circle</text><text class="body" x="24" y="235">Avery proposed you as sole owner of “Dad.”</text><rect class="info" x="24" y="260" rx="14" width="472" height="415"/><text class="h2" x="46" y="300">Before you decide</text><text class="body" x="46" y="337">✓ You become the sole owner.</text><text class="support" x="66" y="365">Avery does not remain an owner.</text><text class="body" x="46" y="400">✓ You control who receives access.</text><text class="support" x="66" y="428">Manage or revoke it under the approved model.</text><text class="body" x="46" y="463">✓ Family relationship grants no authority.</text><text class="body" x="46" y="498">✓ Your consent comes before private data.</text><text class="support" x="66" y="526">No private information is shown before acceptance.</text><text class="body" x="46" y="561">✓ Ownership and required membership</text><text class="body" x="66" y="591">activate together on acceptance.</text><text class="support" x="46" y="625">No joint ownership · no second invitation.</text><text class="support" x="46" y="651">You may decline.</text><rect class="primary" x="24" y="705" rx="12" width="472" height="58"/><text class="label white" x="185" y="741">Review and accept</text><rect class="danger" x="24" y="785" rx="12" width="225" height="48"/><text class="label red" x="108" y="815">Decline</text><rect class="control" x="271" y="785" rx="12" width="225" height="48"/><text class="label" x="327" y="815">Return safely</text></g>

<g transform="translate(55 2010)"><text class="cap" y="-14">SCREEN 10 · OWNERSHIP PENDING</text><rect class="phone" rx="28" width="520" height="850"/><rect class="ctx" x="20" y="20" rx="14" width="480" height="76"/><text class="support" x="40" y="48">CIRCLE · Harbor Circle</text><text class="label" x="40" y="77">Care Recipient · Pending “Dad” · Inactive</text><text class="h1" x="24" y="145">Ownership pending</text><rect class="warn" x="24" y="170" rx="14" width="472" height="72"/><text class="h2" x="46" y="214">◷ Awaiting decision · No authority</text><rect class="decor" x="24" y="265" rx="14" width="472" height="300"/><text class="support" x="46" y="302">PROPOSED OWNER</text><text class="body" x="46" y="334">r•••@example.test</text><text class="support" x="46" y="372">SENT</text><text class="body" x="46" y="404">July 16, 2026</text><text class="support" x="46" y="442">EXPIRES</text><text class="body" x="46" y="474">July 23, 2026</text><text class="support" x="46" y="512">PRIVATE RECORD</text><text class="body" x="46" y="544">Inactive · No private information</text><rect class="primary" x="24" y="600" rx="12" width="472" height="58"/><text class="label white" x="156" y="636">Resend ownership invitation</text><rect class="danger" x="24" y="680" rx="12" width="472" height="58"/><text class="label red" x="194" y="716">Cancel proposal</text><rect class="control" x="24" y="760" rx="12" width="472" height="58"/><text class="label" x="201" y="796">Back to Circle</text></g>

<g transform="translate(640 2010)"><text class="cap" y="-14">BATCH REVIEW KEY</text><rect class="decor" rx="24" width="1105" height="850"/><text class="h1" x="32" y="70">Documented visual-system application</text><text class="body" x="32" y="125">✓ Body ≥ 18 px · supporting ≥ 16 px · controls ≥ 48 px</text><text class="body" x="32" y="170">✓ Ink 700 interactive boundaries · Mineral 300 decorative only</text><text class="body" x="32" y="215">✓ Persistent labels · explicit context · text-plus-icon/shape status</text><text class="body" x="32" y="260">✓ Verified-email identity · sole ownership · deny by default</text><text class="body" x="32" y="305">✓ No relationship-based authority or pre-authorization protected content</text><text class="body" x="32" y="350">✓ Red limited to errors and destructive actions</text><text class="h2" x="32" y="430">Traceability correction · GOV-004</text><text class="body" x="32" y="470">Screen 4 → UF-01 · Screens 6–7 → UF-04/UF-05</text><text class="body" x="32" y="505">Screens 8–10 → UF-03 · identifiers corrected without behavior changes</text><text class="h2" x="32" y="570">Temporary exclusion · GOV-005</text><text class="body" x="32" y="610">Membership-only invitations are not shown and remain undecided.</text><text class="support" x="32" y="690">Static review evidence only · not approved · runtime conformance remains future work.</text></g>
</svg>

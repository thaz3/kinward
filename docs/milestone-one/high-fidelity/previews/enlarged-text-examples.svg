<rect class="control" x="24" y="1490" rx="14" width="472" height="110"/>
<text class="label" x="198" y="1560">Cancel</text>

<rect class="info" x="24" y="1680" rx="18" width="472" height="420"/>
<text class="h2" x="48" y="1750">Target sizes</text>
<text class="body" x="48" y="1825">Every radio card and</text>
<text class="body" x="48" y="1873">action exceeds 48 px.</text>
<text class="body" x="48" y="1945">Context names wrap</text>
<text class="body" x="48" y="1993">inside growing cards.</text>

<text class="support" x="24" y="2220">Full-page labeled radio group.</text>
<text class="support" x="24" y="2265">No custom dropdown.</text>
<text class="support" x="24" y="2340">Additional authorized contexts</text>
<text class="support" x="24" y="2385">continue by vertical scroll.</text>
<text class="support" x="24" y="2460">Primary Evergreen action uses</text>
<text class="support" x="24" y="2505">explicit white label fill.</text>
<text class="support" x="24" y="2580">No clipped labels or overlap.</text>
</g>

<!-- SCREEN 32 -->
<g transform="translate(1230 200)">

<text class="support" x="24" y="2320">No gestures, abbreviations,</text>
<text class="support" x="24" y="2365">or icon-only destinations.</text>
<text class="support" x="24" y="2440">Labels wrap inside vertically</text>
<text class="support" x="24" y="2485">growing targets.</text>
<text class="support" x="24" y="2560">No horizontal scrolling.</text>
<text class="support" x="24" y="2635">Source order is preserved.</text>
<text class="support" x="24" y="2710">Close returns to the page.</text>

<text class="support" x="48" y="1585">DAD - JUL 15</text>
<text class="h2" x="48" y="1660">Access review</text>
<text class="h2" x="48" y="1715">recorded</text>
<text class="body" x="48" y="1790">Actor unavailable</text>
<text class="body" x="48" y="1838">in your scope</text>
<text class="support" x="48" y="1905">Long metadata wraps.</text>
<text class="support" x="48" y="1950">Unauthorized fields</text>
<text class="support" x="48" y="1995">are omitted without</text>
<text class="support" x="48" y="2040">a hidden count.</text>
<rect class="control" x="48" y="2090" rx="14" width="424" height="100"/>
<text class="label blue" x="95" y="2154">View permitted details</text>

<rect class="neutral" x="24" y="2230" rx="18" width="472" height="280"/>
<text class="h2" x="48" y="2300">Filtered result</text>
<text class="body" x="48" y="2375">No permitted events</text>
<text class="body" x="48" y="2423">match.</text>
<text class="support" x="48" y="2480">Clear filter - no total</text>

<text class="support" x="24" y="2620">Circle-wide and recipient</text>
<text class="support" x="24" y="2665">rows remain separate.</text>
<text class="support" x="24" y="2740">Masked actor text stays</text>
<text class="support" x="24" y="2785">complete when wrapped.</text>
</g>

<!-- SCREEN 38 -->
<g transform="translate(320 3350)">
<text class="cap" y="-18">SCREEN 38 - COMPLETE ENLARGED NAVIGATION - 200%</text>
<rect class="phone" rx="28" width="520" height="3000"/>
<rect class="ctx" x="20" y="20" rx="16" width="480" height="210"/>

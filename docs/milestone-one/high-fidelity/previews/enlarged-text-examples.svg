<text class="h1" x="24" y="341">context</text>
<text class="body" x="24" y="420">Only contexts you</text>
<text class="body" x="24" y="468">can access are listed.</text>

<rect x="24" y="530" rx="16" width="472" height="250" fill="#DCECE6" stroke="#17634D" stroke-width="3"/>
<text class="h2" x="48" y="610">Selected</text>
<text class="h2" x="48" y="665">Circle-wide</text>
<text class="body" x="48" y="730">Current choice</text>

<rect class="control" x="24" y="830" rx="16" width="472" height="190"/>
<text class="h2" x="48" y="920">Dad</text>
<text class="support" x="48" y="980">Care Recipient</text>

<rect class="control" x="24" y="1070" rx="16" width="472" height="190"/>

<rect x="24" y="520" rx="16" width="472" height="230" fill="#DCECE6" stroke="#17634D" stroke-width="3"/>
<rect class="primary" x="24" y="520" width="10" height="230"/>
<text class="h2" x="58" y="600">Overview</text>
<text class="body" x="58" y="665">Current page</text>
<text class="support" x="58" y="715">Selected destination</text>

<rect class="control" x="24" y="800" rx="16" width="472" height="160"/>
<text class="h2" x="58" y="900">Members</text>

<rect class="control" x="24" y="1010" rx="16" width="472" height="160"/>
<text class="h2" x="58" y="1110">Roles</text>

<rect class="control" x="24" y="1220" rx="16" width="472" height="160"/>
<text class="h2" x="58" y="1320">Audit history</text>

<rect class="control" x="24" y="1430" rx="16" width="472" height="160"/>
<text class="h2" x="58" y="1530">Settings</text>

<rect class="info" x="24" y="1660" rx="18" width="472" height="420"/>
<text class="h2" x="48" y="1730">Complete labels</text>
<text class="body" x="48" y="1805">Every destination is a</text>
<text class="body" x="48" y="1853">distinct target with a</text>
<text class="body" x="48" y="1901">persistent text label.</text>

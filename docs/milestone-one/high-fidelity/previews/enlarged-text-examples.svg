<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="7600" viewBox="0 0 1800 7600" role="img" aria-labelledby="title desc">
<title id="title">Kinward representative calibrated 200-percent text-resize evidence</title>
<desc id="desc">Static design evidence representing a calibrated 200-percent text-size relationship for Screens 3, 13, 32, 38, and 39. Uses exact two-times type roles on a narrow frame: 36 pixel body, 32 pixel supporting and labels, 44 pixel section headings, and 56 pixel page headings. Primary Evergreen actions use explicit white fills. Runtime conformance requires later implementation testing.</desc>
<defs><style>
text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#20312A}
.bg{fill:#ECEFEA}
.phone{fill:#F7F6F2;stroke:#20312A;stroke-width:5}
.decor{fill:#FFF;stroke:#C9D2CD;stroke-width:3}
.control{fill:#FFF;stroke:#4C5F56;stroke-width:3}
.primary{fill:#17634D}
.ctx{fill:#DCECE6}
.info{fill:#E2F0F8}
.warn{fill:#FFF1C7}
.neutral{fill:#E9EEF0}
.danger{fill:#FFF;stroke:#A33A3A;stroke-width:3}
.focus{fill:none;stroke:#7047B6;stroke-width:3}
.sep{fill:none;stroke:#FFF;stroke-width:2}
.h1{font-size:56px;font-weight:700}
.h2{font-size:44px;font-weight:700}
.body{font-size:36px}
.support{font-size:32px;fill:#4C5F56}
.label{font-size:32px;font-weight:700}
.red{fill:#A33A3A}
.blue{fill:#155E8A}
.cap{font-size:22px;font-weight:700}
.title{font-size:44px;font-weight:700}
.sub{font-size:24px;fill:#4C5F56}
</style></defs>
<rect class="bg" width="1800" height="7600"/>
<text class="title" x="50" y="60">Representative package - calibrated 200% text-resize evidence</text>
<text class="sub" x="50" y="100">Screens 3, 13, 32, 38, 39 - exact 2x roles on 520-unit frames - static design evidence only</text>
<text class="sub" x="50" y="134">Body 36 - supporting/labels 32 - section headings 44 - page headings 56 - primary labels use explicit white fill</text>

<!-- SCREEN 3 -->
<g transform="translate(50 200)">
<text class="cap" y="-18">SCREEN 3 - MY KINWARD - 200%</text>
<rect class="phone" rx="28" width="520" height="2920"/>
<text class="h1" x="24" y="78">My Kinward</text>
<text class="support" x="24" y="130">Signed in:</text>
<text class="label" x="24" y="174">a...@example.test</text>

<rect class="warn" x="24" y="210" rx="18" width="472" height="520"/>
<text class="h2" x="48" y="275">Access review</text>
<text class="h2" x="48" y="330">due</text>
<text class="label" x="48" y="400">Dad - Riley access</text>
<text class="body" x="48" y="460">Access is not changed</text>
<text class="body" x="48" y="508">automatically.</text>
<rect class="focus" x="43" y="545" rx="19" width="434" height="114"/>
<rect class="sep" x="47" y="549" rx="17" width="426" height="106"/>
<rect class="primary" x="50" y="552" rx="14" width="420" height="100"/>
<text class="label" fill="#FFFFFF" x="140" y="616">Review access</text>

<rect class="info" x="24" y="780" rx="18" width="472" height="430"/>
<text class="h2" x="48" y="845">Pending</text>
<text class="h2" x="48" y="900">invitation</text>
<text class="body" x="48" y="970">Harbor Circle</text>
<text class="body" x="48" y="1018">Not active until</text>
<text class="body" x="48" y="1066">accepted</text>
<rect class="control" x="48" y="1110" rx="14" width="424" height="100"/>
<text class="label blue" x="112" y="1174">Review invitation</text>

<text class="h2" x="24" y="1300">Active Circles</text>
<rect class="decor" x="24" y="1340" rx="18" width="472" height="420"/>
<text class="h2" x="48" y="1410">Harbor Circle</text>
<text class="body" x="48" y="1480">Circle Head</text>
<text class="support" x="48" y="1535">Active membership</text>
<rect class="control" x="48" y="1585" rx="14" width="424" height="100"/>
<text class="label blue" x="145" y="1649">Open Harbor</text>

<rect class="control" x="24" y="1820" rx="14" width="472" height="110"/>
<text class="label" x="120" y="1890">Create a Circle</text>

<rect class="ctx" x="24" y="2010" rx="18" width="472" height="280"/>
<text class="h2" x="48" y="2080">Context</text>
<text class="body" x="48" y="2150">Active Circle cards</text>
<text class="body" x="48" y="2198">appear below review</text>
<text class="body" x="48" y="2246">and invitation items.</text>

<text class="support" x="24" y="2400">Review-due, pending invitation,</text>
<text class="support" x="24" y="2445">and active Circle remain distinct.</text>
<text class="support" x="24" y="2520">Primary label fill is explicit white.</text>
<text class="support" x="24" y="2565">Controls stack; no horizontal scroll.</text>
<text class="support" x="24" y="2640">Targets remain at least 48 px high.</text>
<text class="support" x="24" y="2685">Visible focus uses violet ring.</text>
</g>

<!-- SCREEN 13 -->
<g transform="translate(640 200)">
<text class="cap" y="-18">SCREEN 13 - CHOOSE CONTEXT - 200%</text>
<rect class="phone" rx="28" width="520" height="2920"/>

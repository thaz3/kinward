<text class="h2" x="48" y="1010">role updated</text>
<text class="body" x="48" y="1085">Actor:</text>
<text class="body" x="48" y="1133">Alexandra</text>
<text class="body" x="48" y="1181">Montgomery-</text>
<text class="body" x="48" y="1229">Santos</text>
<text class="support" x="48" y="1290">Scope: Harbor Circle</text>
<text class="support" x="48" y="1335">Result: Active</text>
<rect class="control" x="48" y="1370" rx="14" width="424" height="100"/>
<text class="label blue" x="95" y="1434">View permitted details</text>

<rect class="decor" x="24" y="1480" rx="18" width="472" height="680"/>

<svg xmlns="http://www.w3.org/2000/svg" width="2940" height="1040" viewBox="0 0 2940 1040" role="img" aria-labelledby="title desc"><title id="title">Repaired Draft G3 standard-mobile high-fidelity screens 28 through 30, 33, 34, 36, and 37</title><desc id="desc">Seven verified production-group mobile frames for backup, recovery, denial, empty, and loading states (GOV-007 Closed — PASS).</desc><rect width="2940" height="1040" fill="#F7F6F2"/><text x="40" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#20312A">G3 · verified continuity and safe system states · GOV-007 Closed — PASS</text><defs><g id="p"><rect width="390" height="844" rx="28" fill="#F7F6F2" stroke="#20312A" stroke-width="3"/><rect x="20" y="20" width="350" height="70" rx="12" fill="#DCECE6"/><text x="36" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#20312A">CIRCLE · Harbor Circle</text><text x="36" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#4C5F56">CONTEXT · permission-safe</text></g><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:22px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:16px;fill:#4C5F56}.c{fill:#FFFFFF;stroke:#4C5F56;stroke-width:2}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.status{fill:#E9EEF0;stroke:#4C5F56;stroke-width:2}.q{fill:#17634D}.w{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;fill:#FFFFFF}.f{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}.info{fill:#E2F0F8;stroke:#4C5F56;stroke-width:2}</style></defs>
<g transform="translate(40 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 28 · Circle-wide backup</text><text class="h" x="28" y="164">Designate a backup</text><rect class="f" x="23" y="194" width="344" height="104" rx="19"/><rect class="sep" x="27" y="198" width="336" height="96" rx="17"/><rect class="selected" x="30" y="201" width="330" height="90" rx="14"/><text class="h2" x="48" y="238">✓ Riley Chen · Selected</text><text class="s" x="48" y="270">Eligible verified adult member</text><rect class="status" x="28" y="316" width="334" height="58" rx="16"/><text class="b" x="48" y="353">◷ Dormant · zero authority</text><rect class="info" x="28" y="390" width="334" height="154" rx="16"/><text class="s" x="48" y="424">No active access or automatic succession.</text><text class="s" x="48" y="454">Fresh verification and explicit activation</text><text class="s" x="48" y="484">are required. The backup cannot</text><text class="s" x="48" y="514">self-activate or become Circle Head.</text><rect class="q" x="28" y="568" width="334" height="56" rx="10"/><text class="w" fill="#FFFFFF" x="91" y="603">Review designation</text><rect class="c" x="28" y="640" width="334" height="52" rx="10"/><text class="b" x="170" y="673">Cancel</text></g>
<g transform="translate(450 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 29 · unavailable</text><text class="h" x="28" y="164">Activation unavailable</text><rect class="c" x="28" y="205" width="334" height="240" rx="16"/><text class="b" x="48" y="248">⊘ No authority granted</text><text class="s" x="48" y="284">An authorized approver is not</text><text class="s" x="48" y="314">available for this request.</text><text class="s" x="48" y="356">The backup remains dormant.</text><text class="s" x="48" y="392">This does not satisfy a Circle</text><text class="s" x="48" y="422">Head replacement.</text><rect class="q" x="28" y="495" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="88" y="528">Return to My Kinward</text></g>
<g transform="translate(860 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 30 · terminal safe outcome</text><text class="h" x="28" y="164">Request unavailable</text><rect class="c" x="28" y="205" width="334" height="210" rx="16"/><text class="b" x="48" y="248">This request cannot currently</text><text class="b" x="48" y="278">be completed.</text><text class="s" x="48" y="326">No authority was granted.</text><text class="s" x="48" y="364">No alternate recovery path is</text><text class="s" x="48" y="394">available in Milestone One.</text><rect class="q" x="28" y="465" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="88" y="498">Return to My Kinward</text></g>
<g transform="translate(1270 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 33 · consequential denial</text><text class="h" x="28" y="164">Nothing changed</text><rect class="c" x="28" y="205" width="334" height="210" rx="16"/><text class="b" x="48" y="248">This action isn’t available</text><text class="b" x="48" y="278">with your current access.</text><text class="s" x="48" y="326">Protected details and reasons</text><text class="s" x="48" y="356">are not shown here.</text><text class="s" x="48" y="394">Audit visibility is separate.</text><rect class="f" x="23" y="465" width="344" height="62" rx="15"/><rect class="sep" x="27" y="469" width="336" height="54" rx="13"/><rect class="q" x="28" y="470" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="157" y="503">Return</text></g>
<g transform="translate(1680 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 34 · authorized true empty</text><text class="h" x="28" y="164">No other members yet</text><text class="s" x="28" y="200">Circle — Harbor Circle</text><rect class="c" x="28" y="235" width="334" height="160" rx="16"/><text class="b" x="48" y="278">Invite an adult when you’re</text><text class="b" x="48" y="308">ready to coordinate together.</text><text class="s" x="48" y="356">Hidden or filtered counts are</text><text class="s" x="48" y="384">never shown as empty.</text><rect class="q" x="28" y="445" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="116" y="478">Invite an adult</text></g>
<g transform="translate(2090 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 36 · context clearing</text><text class="h" x="28" y="164">Changing context</text><rect class="c" x="28" y="205" width="334" height="220" rx="16"/><rect x="48" y="244" width="254" height="22" rx="8" fill="#C9D2CD"/><rect x="48" y="286" width="210" height="22" rx="8" fill="#C9D2CD"/><text class="b" x="48" y="346">Loading authorized content…</text><text class="s" x="48" y="382">Previous labels, counts, drafts,</text><text class="s" x="48" y="410">and responses are cleared.</text><rect x="28" y="475" width="334" height="52" rx="10" fill="#FFF" stroke="#4C5F56" stroke-width="2"/><text class="b" x="161" y="508">Back</text></g>
<g transform="translate(2500 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 37 · neutral denial</text><text class="h" x="28" y="164">Information unavailable</text><rect class="c" x="28" y="205" width="334" height="220" rx="16"/><text class="b" x="48" y="248">This information isn’t</text><text class="b" x="48" y="278">available to you.</text><text class="s" x="48" y="326">No record, person, reason,</text><text class="s" x="48" y="356">event, or count is revealed.</text><text class="s" x="48" y="398">Your access has not changed.</text><rect class="q" x="28" y="475" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="88" y="508">Return to My Kinward</text></g></svg>

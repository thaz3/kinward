<svg xmlns="http://www.w3.org/2000/svg" width="3220" height="2100" viewBox="0 0 3220 2100" role="img" aria-labelledby="title desc"><title id="title">Group one calibrated 200 percent text evidence</title><desc id="desc">Seven narrow frames use 56 pixel headings, 44 pixel section text, 36 pixel body, and 32 pixel labels with vertical reflow, explicit white focus separation, and target-sized controls.</desc><rect width="3220" height="2100" fill="#F7F6F2"/><text x="40" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#20312A">Static design evidence representing a calibrated 200% text-size relationship. Runtime conformance requires later implementation testing.</text><defs><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:56px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:44px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:32px;fill:#4C5F56}.w{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;font-weight:700;fill:#FFF}.p{fill:#FFF;stroke:#4C5F56;stroke-width:3}.c{fill:#F7F6F2;stroke:#4C5F56;stroke-width:3}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.q{fill:#17634D;}.f{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}.danger{fill:#FFF;stroke:#A33A3A;stroke-width:3}.red{fill:#A33A3A}</style></defs>
<g transform="translate(40 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 11 · Consent</text><text class="h" x="24" y="140">Accept</text><text class="h" x="24" y="206">ownership</text><text class="b" x="24" y="274">You will be Dad’s</text><text class="b" x="24" y="320">sole owner.</text><rect class="f" x="19" y="360" width="392" height="320" rx="22"/><rect class="sep" x="23" y="364" width="384" height="312" rx="20"/><rect class="c" x="26" y="367" width="378" height="306" rx="18"/><text class="b" x="46" y="420">□ Unchecked</text><text class="b" x="46" y="470">consent row</text><text class="s" x="46" y="534">I consent to become</text><text class="s" x="46" y="578">Dad’s sole owner.</text><text class="s" x="46" y="630">No joint ownership.</text><rect x="24" y="720" width="382" height="120" rx="14" fill="#E9EEF0" stroke="#4C5F56" stroke-width="3"/><text class="b" x="56" y="794" fill="#4C5F56">Accept disabled</text><text class="s" x="24" y="900">Checked enables accept.</text><rect class="selected" x="24" y="940" width="382" height="220" rx="18"/><text class="b" x="46" y="1000">☑ Consent checked</text><text class="s" x="46" y="1060">Acceptance enabled.</text><text class="s" x="46" y="1110">Choice is recorded.</text><rect class="q" x="24" y="1200" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="62" y="1262">Accept</text><text class="w" fill="#FFFFFF" x="62" y="1306">ownership</text><text class="s" x="24" y="1410">◷ Accepting… · locked</text><text class="s" x="24" y="1460">! Consent required</text><rect class="c" x="24" y="1520" width="382" height="120" rx="14"/><text class="b" x="130" y="1594">Back</text></g>
<g transform="translate(490 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 12 · Decline</text><text class="h" x="24" y="140">Decline</text><text class="h" x="24" y="206">invitation?</text><text class="b" x="24" y="284">No Care Recipient,</text><text class="b" x="24" y="330">ownership, authority,</text><text class="b" x="24" y="376">or membership begins.</text><text class="s" x="24" y="450">Nothing changes until</text><text class="s" x="24" y="494">you confirm.</text><rect class="f" x="19" y="560" width="392" height="154" rx="20"/><rect class="sep" x="23" y="564" width="384" height="146" rx="18"/><rect class="q" x="26" y="567" width="378" height="140" rx="14"/><text class="w" fill="#FFFFFF" x="70" y="630">Keep</text><text class="w" fill="#FFFFFF" x="70" y="674">reviewing</text><rect class="danger" x="24" y="760" width="382" height="180" rx="14"/><text x="62" y="830" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#A33A3A">Decline</text><text x="62" y="880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#A33A3A">ownership</text><text x="62" y="930" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#A33A3A">invitation</text></g>
<g transform="translate(940 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 14 · Identity</text><text class="h" x="24" y="140">Circle</text><text class="h" x="24" y="206">members</text><text class="s" x="24" y="262">Harbor Circle</text><rect class="c" x="24" y="300" width="382" height="360" rx="18"/><text class="b" x="46" y="364">Jordan</text><text class="b" x="46" y="410">Lee-Washington</text><text class="s" x="46" y="472">Family Coordinator</text><text class="s" x="46" y="518">Circle-wide role</text><text class="s" x="46" y="564">No recipient access</text><rect class="q" x="24" y="720" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="81" y="786">Invite an</text><text class="w" fill="#FFFFFF" x="81" y="830">adult</text></g>
<g transform="translate(1390 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 15 · Role</text><text class="h" x="24" y="140">Assign</text><text class="h" x="24" y="206">Circle role</text><rect class="f" x="19" y="260" width="392" height="420" rx="22"/><rect class="sep" x="23" y="264" width="384" height="412" rx="20"/><rect class="selected" x="26" y="267" width="378" height="406" rx="18"/><text class="h2" x="46" y="330">✓ Selected</text><text class="b" x="46" y="390">Family</text><text class="b" x="46" y="436">Coordinator</text><text class="s" x="46" y="510">Circle-wide scope.</text><text class="s" x="46" y="560">No ownership or</text><text class="s" x="46" y="604">medical access.</text><rect class="c" x="24" y="720" width="382" height="220" rx="18"/><text class="b" x="46" y="790">Support</text><text class="b" x="46" y="836">Coordinator</text><text class="s" x="46" y="900">Not selected.</text><text class="s" x="24" y="1000">! Select an available role</text><text class="s" x="24" y="1060">Discard unsaved?</text><rect class="q" x="24" y="1120" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="80" y="1182">Review</text><text class="w" fill="#FFFFFF" x="80" y="1226">assignment</text><rect class="c" x="24" y="1300" width="382" height="120" rx="14"/><text class="b" x="140" y="1374">Cancel</text></g>
<g transform="translate(1840 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 16 · Scoped</text><text class="h" x="24" y="140">Assign for</text><text class="h" x="24" y="206">Dad only</text><rect class="selected" x="24" y="270" width="382" height="360" rx="18"/><text class="h2" x="46" y="340">✓ Selected</text><text class="b" x="46" y="400">Support</text><text class="b" x="46" y="446">Coordinator</text><text class="s" x="46" y="520">Dad only · exact</text><text class="s" x="46" y="564">permitted actions.</text><text class="s" x="46" y="616">No other recipient</text><text class="s" x="46" y="660">access.</text><rect class="c" x="24" y="670" width="382" height="200" rx="18"/><text class="b" x="46" y="740">Family</text><text class="b" x="46" y="786">Coordinator</text><text class="s" x="46" y="840">Not selected.</text><text class="s" x="24" y="930">⊘ Unavailable role</text><text class="s" x="24" y="980">shown with reason.</text><rect class="q" x="24" y="1040" width="382" height="120" rx="14"/><text class="w" fill="#FFFFFF" x="107" y="1114">Review role</text><rect class="c" x="24" y="1200" width="382" height="120" rx="14"/><text class="b" x="164" y="1274">Back</text></g>
<g transform="translate(2290 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 17 · Mode</text><text class="h" x="24" y="140">Self-</text><text class="h" x="24" y="206">Managed</text><rect class="selected" x="24" y="270" width="382" height="420" rx="18"/><text class="b" x="46" y="340">✓ Dad stays in</text><text class="b" x="46" y="386">control.</text><text class="s" x="46" y="460">No management</text><text class="s" x="46" y="504">authority is granted.</text><text class="s" x="46" y="566">Separate approved</text><text class="s" x="46" y="610">permissions remain.</text><rect class="q" x="24" y="760" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="72" y="822">Use Self-</text><text class="w" fill="#FFFFFF" x="72" y="866">Managed</text></g>
<g transform="translate(2740 130)"><rect class="p" width="430" height="1880" rx="28"/><text class="s" x="24" y="62">Screen 18 · Setup</text><text class="h" x="24" y="140">Shared</text><text class="h" x="24" y="206">Management</text><rect class="c" x="24" y="270" width="382" height="520" rx="18"/><text class="b" x="46" y="336">Riley Chen-</text><text class="b" x="46" y="382">Washington</text><text class="s" x="46" y="448">✓ Manage roles</text><text class="s" x="46" y="500">✓ Review access</text><text class="s" x="46" y="562">Dad remains sole</text><text class="s" x="46" y="604">owner.</text><text class="s" x="46" y="666">Access is revocable.</text><text class="s" x="24" y="840">! Choose eligible adult</text><text class="s" x="24" y="890">! Catalog unavailable</text><rect class="q" x="24" y="960" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="62" y="1022">Review shared</text><text class="w" fill="#FFFFFF" x="62" y="1066">access</text><rect class="c" x="24" y="1140" width="382" height="120" rx="14"/><text class="b" x="140" y="1214">Cancel</text></g></svg>

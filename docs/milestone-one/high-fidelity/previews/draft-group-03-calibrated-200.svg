<svg xmlns="http://www.w3.org/2000/svg" width="3220" height="2200" viewBox="0 0 3220 2200" role="img" aria-labelledby="title desc"><title id="title">Group three calibrated 200 percent text evidence</title><desc id="desc">Seven continuity and system-state frames use calibrated doubled text roles, stacked controls, complete messages, and explicit white focus separation.</desc><rect width="3220" height="2200" fill="#F7F6F2"/><text x="40" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#20312A">Static design evidence representing a calibrated 200% text-size relationship. Runtime conformance requires later implementation testing.</text><defs><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:56px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:44px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:32px;fill:#4C5F56}.w{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:36px;font-weight:700;fill:#FFF}.p{fill:#FFF;stroke:#4C5F56;stroke-width:3}.c{fill:#F7F6F2;stroke:#4C5F56;stroke-width:3}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.status{fill:#E9EEF0;stroke:#4C5F56;stroke-width:3}.info{fill:#E2F0F8;stroke:#4C5F56;stroke-width:3}.q{fill:#17634D;}.f{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}</style></defs>
<g transform="translate(40 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 28 · Backup</text><text class="h" x="24" y="140">Designate</text><text class="h" x="24" y="206">backup</text><rect class="f" x="19" y="250" width="392" height="260" rx="22"/><rect class="sep" x="23" y="254" width="384" height="252" rx="20"/><rect class="selected" x="26" y="257" width="378" height="246" rx="18"/><text class="b" x="46" y="320">✓ Riley Chen</text><text class="b" x="46" y="366">Selected</text><text class="s" x="46" y="440">Eligible verified</text><text class="s" x="46" y="484">adult member</text><rect class="status" x="24" y="560" width="382" height="160" rx="18"/><text class="h2" x="46" y="630">◷ Dormant</text><text class="s" x="46" y="690">Separate status</text><rect class="info" x="24" y="760" width="382" height="320" rx="18"/><text class="s" x="46" y="830">Zero authority ·</text><text class="s" x="46" y="874">no active access.</text><text class="s" x="46" y="940">Fresh verification</text><text class="s" x="46" y="984">required. No</text><text class="s" x="46" y="1028">automatic succession.</text><text class="s" x="24" y="1140">○ No eligible adults</text><text class="s" x="24" y="1190">! Choose an adult</text><rect class="q" x="24" y="1260" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="64" y="1322">Review</text><text class="w" fill="#FFFFFF" x="64" y="1366">designation</text></g>
<g transform="translate(490 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 29 · Activate</text><text class="h" x="24" y="140">Activation</text><text class="h" x="24" y="206">unavailable</text><text class="b" x="24" y="286">No authority</text><text class="b" x="24" y="332">was granted.</text><text class="s" x="24" y="402">Fresh verification</text><text class="s" x="24" y="444">is required.</text><text class="s" x="24" y="506">No automatic</text><text class="s" x="24" y="548">succession.</text><text class="s" x="24" y="610">Backup remains</text><text class="s" x="24" y="652">dormant.</text><text class="s" x="24" y="720">◷ Checking…</text><text class="s" x="24" y="770">⊘ Denied · no</text><text class="s" x="24" y="814">authority granted</text><rect class="f" x="19" y="900" width="392" height="154" rx="20"/><rect class="sep" x="23" y="904" width="384" height="146" rx="18"/><rect class="q" x="26" y="907" width="378" height="140" rx="14"/><text class="w" fill="#FFFFFF" x="56" y="970">Return to</text><text class="w" fill="#FFFFFF" x="56" y="1014">My Kinward</text></g>
<g transform="translate(940 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 30 · Terminal</text><text class="h" x="24" y="140">Request</text><text class="h" x="24" y="206">unavailable</text><text class="b" x="24" y="286">This request cannot</text><text class="b" x="24" y="332">currently be</text><text class="b" x="24" y="378">completed.</text><text class="s" x="24" y="448">No authority granted.</text><text class="s" x="24" y="506">No alternate recovery</text><text class="s" x="24" y="548">in Milestone One.</text><rect class="q" x="24" y="640" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="56" y="702">Return to</text><text class="w" fill="#FFFFFF" x="56" y="746">My Kinward</text></g>
<g transform="translate(1390 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 33 · Denial</text><text class="h" x="24" y="140">Nothing</text><text class="h" x="24" y="206">changed</text><text class="b" x="24" y="286">This action isn’t</text><text class="b" x="24" y="332">available with your</text><text class="b" x="24" y="378">current access.</text><text class="s" x="24" y="448">Protected details and</text><text class="s" x="24" y="490">reasons stay hidden.</text><text class="s" x="24" y="550">No protected identity</text><text class="s" x="24" y="594">is revealed.</text><rect class="f" x="19" y="680" width="392" height="154" rx="20"/><rect class="sep" x="23" y="684" width="384" height="146" rx="18"/><rect class="q" x="26" y="687" width="378" height="140" rx="14"/><text class="w" fill="#FFFFFF" x="130" y="774">Return</text></g>
<g transform="translate(1840 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 34 · Empty</text><text class="h" x="24" y="140">No other</text><text class="h" x="24" y="206">members yet</text><text class="b" x="24" y="286">Invite an adult when</text><text class="b" x="24" y="332">you’re ready to</text><text class="b" x="24" y="378">coordinate together.</text><text class="s" x="24" y="448">Hidden counts never</text><text class="s" x="24" y="490">appear as empty.</text><text class="s" x="24" y="550">Authorized true-empty</text><text class="s" x="24" y="594">only · no premature</text><text class="s" x="24" y="638">protected content.</text><rect class="q" x="24" y="720" width="382" height="142" rx="14"/><text class="w" fill="#FFFFFF" x="81" y="782">Invite an</text><text class="w" fill="#FFFFFF" x="81" y="826">adult</text></g>
<g transform="translate(2290 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 36 · Loading</text><text class="h" x="24" y="140">Changing</text><text class="h" x="24" y="206">context</text><rect class="c" x="24" y="270" width="382" height="580" rx="18"/><rect x="46" y="320" width="300" height="40" rx="10" fill="#C9D2CD"/><rect x="46" y="390" width="240" height="40" rx="10" fill="#C9D2CD"/><text class="b" x="46" y="500">Loading authorized</text><text class="b" x="46" y="546">content…</text><text class="s" x="46" y="620">Previous content</text><text class="s" x="46" y="664">is cleared.</text><text class="s" x="46" y="720">No protected labels,</text><text class="s" x="46" y="764">counts, or drafts.</text><rect class="f" x="19" y="900" width="392" height="154" rx="20"/><rect class="sep" x="23" y="904" width="384" height="146" rx="18"/><rect class="c" x="26" y="907" width="378" height="140" rx="14"/><text class="b" x="150" y="994">Back</text></g>
<g transform="translate(2740 130)"><rect class="p" width="430" height="1980" rx="28"/><text class="s" x="24" y="62">Screen 37 · Denial</text><text class="h" x="24" y="140">Information</text><text class="h" x="24" y="206">unavailable</text><text class="b" x="24" y="286">This information</text><text class="b" x="24" y="332">isn’t available</text><text class="b" x="24" y="378">to you.</text><text class="s" x="24" y="448">No record, person,</text><text class="s" x="24" y="490">reason, event, or</text><text class="s" x="24" y="532">count is revealed.</text><rect class="f" x="19" y="620" width="392" height="154" rx="20"/><rect class="sep" x="23" y="624" width="384" height="146" rx="18"/><rect class="q" x="26" y="627" width="378" height="140" rx="14"/><text class="w" fill="#FFFFFF" x="56" y="690">Return to</text><text class="w" fill="#FFFFFF" x="56" y="734">My Kinward</text></g></svg>

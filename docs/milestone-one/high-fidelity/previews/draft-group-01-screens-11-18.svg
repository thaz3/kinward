<svg xmlns="http://www.w3.org/2000/svg" width="2940" height="1040" viewBox="0 0 2940 1040" role="img" aria-labelledby="title desc">
<title id="title">Draft group one standard-mobile high-fidelity screens 11, 12, and 14 through 18</title><desc id="desc">Seven 390 by 844 mobile frames showing ownership decisions, member and role screens, and management mode setup. Static design evidence pending final package audit.</desc>
<rect width="2940" height="1040" fill="#F7F6F2"/><text x="40" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#20312A">Draft G1 · repaired standard mobile · pending targeted re-audit</text>
<defs><g id="phone"><rect width="390" height="844" rx="28" fill="#F7F6F2" stroke="#20312A" stroke-width="3"/><rect x="20" y="20" width="350" height="72" rx="12" fill="#DCECE6"/><text x="36" y="47" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#20312A">CIRCLE · Harbor Circle</text><text x="36" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#4C5F56">CARE RECIPIENT · context shown below</text></g><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:22px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:16px;fill:#4C5F56}.btn{fill:#17634D}.bt{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;fill:#FFFFFF}.card{fill:#FFFFFF;stroke:#4C5F56;stroke-width:2}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.focus{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}.control{fill:#FFFFFF;stroke:#4C5F56;stroke-width:2}.error{fill:#FBE7E5;stroke:#A33A3A;stroke-width:2}.status{fill:#E9EEF0;stroke:#4C5F56;stroke-width:2}</style></defs>
<g transform="translate(40 120)"><use href="#phone"/><text class="s" x="28" y="120">Screen 11 · consent required · Dad</text><text class="h" x="28" y="158">Accept ownership</text><text class="b" x="28" y="190">Dad · Harbor Circle</text><rect class="card" x="28" y="210" width="334" height="212" rx="16"/><text class="h2" x="48" y="246">Sole ownership</text><text class="s" x="48" y="276">Control Dad’s care information and</text><text class="s" x="48" y="302">choose access. No joint ownership.</text><text class="s" x="48" y="332">Family relationship grants no authority.</text><text class="s" x="48" y="358">No private information appears before</text><text class="s" x="48" y="384">acceptance. This choice is recorded.</text><rect class="focus" x="23" y="442" width="344" height="70" rx="17"/><rect class="sep" x="27" y="446" width="336" height="62" rx="15"/><rect class="control" x="30" y="449" width="330" height="56" rx="12"/><rect x="46" y="463" width="28" height="28" rx="5" fill="#FFFFFF" stroke="#4C5F56" stroke-width="2"/><text class="s" x="88" y="482">I consent to sole ownership for Dad</text><rect x="28" y="532" width="334" height="56" rx="10" fill="#E9EEF0" stroke="#4C5F56" stroke-width="2"/><text class="bt" x="112" y="568" fill="#4C5F56">Accept ownership</text><text class="s" x="28" y="614">Disabled until consent · validation shown</text><rect class="control" x="28" y="632" width="334" height="52" rx="10"/><text class="b" x="170" y="665">Back</text></g>
<g transform="translate(450 120)"><use href="#phone"/><text class="s" x="28" y="116">Screen 12 · destructive confirmation</text><text class="h" x="28" y="158">Decline invitation?</text><text class="b" x="28" y="202">No Care Recipient, ownership,</text><text class="b" x="28" y="230">authority, or membership will begin.</text><rect class="card" x="28" y="270" width="334" height="112" rx="16"/><text class="b" x="48" y="309">Nothing changes until you</text><text class="b" x="48" y="339">confirm this decision.</text><rect class="focus" x="23" y="432" width="344" height="62" rx="15"/><rect class="sep" x="27" y="436" width="336" height="54" rx="13"/><rect class="btn" x="28" y="437" width="334" height="52" rx="10"/><text class="bt" fill="#FFFFFF" x="121" y="470">Keep reviewing</text><rect x="28" y="513" width="334" height="52" rx="10" fill="#FFFFFF" stroke="#A33A3A" stroke-width="2"/><text x="109" y="546" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#A33A3A">Decline invitation</text></g>
<g transform="translate(860 120)"><use href="#phone"/><text class="s" x="28" y="116">Screen 14 · member list</text><text class="h" x="28" y="158">Circle members</text><text class="s" x="28" y="190">Care Recipient — Circle-wide</text><rect class="card" x="28" y="220" width="334" height="104" rx="16"/><text class="b" x="48" y="260">Alex Morgan</text><text class="s" x="48" y="291">Circle Head · Active</text><rect class="card" x="28" y="340" width="334" height="124" rx="16"/><text class="b" x="48" y="380">Jordan Lee</text><text class="s" x="48" y="411">Family Coordinator</text><text class="s" x="48" y="439">No recipient access implied</text><rect class="btn" x="28" y="510" width="334" height="52" rx="10"/><text class="bt" fill="#FFFFFF" x="116" y="543">Invite an adult</text></g>
<g transform="translate(1270 120)"><use href="#phone"/><text class="s" x="28" y="120">Screen 15 · Circle-wide role</text><text class="h" x="28" y="158">Assign Circle role</text><text class="b" x="28" y="196">Jordan Lee · Circle-wide</text><rect class="focus" x="23" y="218" width="344" height="166" rx="19"/><rect class="sep" x="27" y="222" width="336" height="158" rx="17"/><rect class="selected" x="30" y="225" width="330" height="152" rx="14"/><text class="b" x="48" y="262">✓ Selected · Family Coordinator</text><text class="s" x="48" y="296">Coordinates Circle activity.</text><text class="s" x="48" y="326">No ownership, medical, or recipient</text><text class="s" x="48" y="354">access is granted by this role.</text><rect class="btn" x="28" y="418" width="334" height="56" rx="10"/><text class="bt" fill="#FFFFFF" x="101" y="453">Review assignment</text><rect class="control" x="28" y="490" width="334" height="52" rx="10"/><text class="b" x="170" y="523">Cancel</text></g>
<g transform="translate(1680 120)"><use href="#phone"/><text class="s" x="28" y="120">Screen 16 · Care Recipient · Dad</text><text class="h" x="28" y="158">Assign role for Dad</text><text class="b" x="28" y="196">Jordan Lee · Dad only</text><rect class="selected" x="28" y="222" width="334" height="194" rx="16"/><text class="h2" x="48" y="260">✓ Support Coordinator</text><text class="s" x="48" y="296">Selected · exact permitted actions:</text><text class="s" x="48" y="326">Coordinate practical help</text><text class="s" x="48" y="354">View only details Dad shares</text><text class="s" x="48" y="386">No other Care Recipient access</text><rect class="btn" x="28" y="448" width="334" height="56" rx="10"/><text class="bt" fill="#FFFFFF" x="128" y="483">Review role</text><rect class="control" x="28" y="520" width="334" height="52" rx="10"/><text class="b" x="170" y="553">Back</text></g>
<g transform="translate(2090 120)"><use href="#phone"/><text class="s" x="28" y="116">Screen 17 · selected mode</text><text class="h" x="28" y="158">Self-Managed</text><text class="s" x="28" y="190">Care Recipient — Dad</text><rect class="card" x="28" y="220" width="334" height="194" rx="16"/><text class="b" x="48" y="260">✓ Dad stays in control</text><text class="s" x="48" y="294">No one receives management</text><text class="s" x="48" y="322">authority through this choice.</text><text class="s" x="48" y="360">Separate existing permissions</text><text class="s" x="48" y="388">keep their approved limits.</text><rect class="btn" x="28" y="464" width="334" height="52" rx="10"/><text class="bt" fill="#FFFFFF" x="103" y="497">Use Self-Managed</text></g>
<g transform="translate(2500 120)"><use href="#phone"/><text class="s" x="28" y="116">Screen 18 · setup + long identity</text><text class="h" x="28" y="158">Shared Management</text><text class="s" x="28" y="190">Care Recipient — Dad</text><rect class="card" x="28" y="220" width="334" height="230" rx="16"/><text class="b" x="48" y="260">Riley Chen-Washington</text><text class="s" x="48" y="294">Selected scopes:</text><text class="s" x="48" y="324">☑ Manage approved roles</text><text class="s" x="48" y="354">☑ Review permissions</text><text class="s" x="48" y="390">Sole ownership stays with Dad.</text><text class="s" x="48" y="420">Access is recorded and revocable.</text><rect class="btn" x="28" y="500" width="334" height="62" rx="10"/><text class="bt" fill="#FFFFFF" x="78" y="538">Review shared access</text></g>
</svg>

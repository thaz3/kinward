<svg xmlns="http://www.w3.org/2000/svg" width="2940" height="1040" viewBox="0 0 2940 1040" role="img" aria-labelledby="title desc"><title id="title">Repaired Draft G2 standard-mobile high-fidelity screens 19 through 23, 25, and 26</title><desc id="desc">Seven verified production-group mobile frames for delegation setup and lifecycle (GOV-007 Closed — PASS).</desc><rect width="2940" height="1040" fill="#F7F6F2"/><text x="40" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#20312A">G2 · verified delegation screens · GOV-007 Closed — PASS</text><defs><g id="p"><rect width="390" height="844" rx="28" fill="#F7F6F2" stroke="#20312A" stroke-width="3"/><rect x="20" y="20" width="350" height="70" rx="12" fill="#DCECE6"/><text x="36" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#20312A">CIRCLE · Harbor Circle</text><text x="36" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#4C5F56">CARE RECIPIENT · Dad</text></g><style>.h{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;fill:#20312A}.h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:22px;font-weight:700;fill:#20312A}.b{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;fill:#20312A}.s{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:16px;fill:#4C5F56}.c{fill:#FFFFFF;stroke:#4C5F56;stroke-width:2}.selected{fill:#DCECE6;stroke:#17634D;stroke-width:3}.disabled{fill:#E9EEF0;stroke:#4C5F56;stroke-width:2;stroke-dasharray:8 5}.q{fill:#17634D}.w{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;fill:#FFFFFF}.f{fill:none;stroke:#7047B6;stroke-width:3}.sep{fill:none;stroke:#FFFFFF;stroke-width:2}.danger{fill:#FFFFFF;stroke:#A33A3A;stroke-width:2}.red{fill:#A33A3A}.status{fill:#FFF1C7;stroke:#4C5F56;stroke-width:2}</style></defs>
<g transform="translate(40 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 19 · step 1 of 3</text><text class="h" x="28" y="164">Choose representative</text><rect class="c" x="28" y="205" width="334" height="170" rx="16"/><text class="b" x="48" y="246">✓ Riley Chen · Selected</text><text class="s" x="48" y="282">Receives only confirmed scopes.</text><text class="s" x="48" y="314">Not ownership or legal authority.</text><text class="s" x="48" y="346">Recorded and revocable.</text><rect class="q" x="28" y="425" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="99" y="458">Continue to scope</text></g>
<g transform="translate(450 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 20 · exact grant scope</text><text class="h" x="28" y="164">Choose exact scope</text><rect class="f" x="23" y="198" width="344" height="104" rx="19"/><rect class="sep" x="27" y="202" width="336" height="96" rx="17"/><rect class="selected" x="30" y="205" width="330" height="90" rx="14"/><text class="h2" x="48" y="242">✓ Manage approved roles</text><text class="s" x="48" y="274">Selected · for Dad only</text><rect class="c" x="28" y="316" width="334" height="118" rx="16"/><text class="h2" x="48" y="352">Review permissions</text><text class="s" x="48" y="382">Not selected · remains denied.</text><text class="s" x="48" y="410">Available exact scope for Dad.</text><rect class="q" x="28" y="466" width="334" height="56" rx="10"/><text class="w" fill="#FFFFFF" x="88" y="501">Continue to duration</text><rect class="c" x="28" y="538" width="334" height="52" rx="10"/><text class="b" x="170" y="571">Back</text></g>
<g transform="translate(860 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 21 · full-row duration cards</text><text class="h" x="28" y="164">Choose duration</text><rect class="f" x="23" y="186" width="344" height="104" rx="19"/><rect class="sep" x="27" y="190" width="336" height="96" rx="17"/><rect class="selected" x="30" y="193" width="330" height="90" rx="14"/><text class="h2" x="48" y="230">✓ 90 days · Selected</text><text class="s" x="48" y="262">Suggested · ends about Jul 16</text><rect class="c" x="28" y="310" width="334" height="72" rx="14"/><text class="h2" x="48" y="344">Custom date</text><text class="s" x="48" y="370">Month / day / year</text><rect class="c" x="28" y="398" width="334" height="90" rx="14"/><text class="h2" x="48" y="434">Until revoked</text><text class="s" x="48" y="464">Opens Screen 22 · 90-day review</text><rect class="q" x="28" y="514" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="104" y="547">Review delegation</text><rect class="c" x="28" y="582" width="334" height="52" rx="10"/><text class="b" x="170" y="615">Back</text></g>
<g transform="translate(1270 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 22 · explicit confirmation</text><text class="h" x="28" y="164">Until revoked</text><rect class="c" x="28" y="205" width="334" height="260" rx="16"/><text class="b" x="48" y="246">No fixed expiry</text><text class="s" x="48" y="282">Review recurs every 90 days.</text><text class="s" x="48" y="316">Due status does not renew,</text><text class="s" x="48" y="346">suspend, revoke, or notify.</text><text class="s" x="48" y="394">You can change access later.</text><text class="s" x="48" y="430">Sole ownership stays with Dad.</text><rect class="q" x="28" y="515" width="334" height="62" rx="10"/><text class="w" fill="#FFFFFF" x="78" y="553">Confirm until revoked</text></g>
<g transform="translate(1680 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 23 · authorized grant detail</text><text class="h" x="28" y="164">Delegation detail</text><rect class="status" x="28" y="186" width="250" height="48" rx="20"/><text class="b" x="48" y="217">✓ Active · Review due</text><rect class="c" x="28" y="250" width="334" height="272" rx="16"/><text class="s" x="48" y="280">REPRESENTATIVE</text><text class="b" x="48" y="308">Riley Chen-Washington</text><text class="s" x="48" y="342">EXACT GRANT · DAD ONLY</text><text class="b" x="48" y="370">Manage approved roles</text><text class="s" x="48" y="404">Started: Apr 16 · Until revoked</text><text class="s" x="48" y="434">Next review: Jul 16</text><text class="s" x="48" y="464">Recorded by Dad · grant ID masked</text><text class="s" x="48" y="494">Visible only to authorized viewers</text><rect class="q" x="28" y="544" width="154" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="72" y="577">Modify</text><rect class="c" x="198" y="544" width="164" height="52" rx="10"/><text class="b" x="246" y="577">Suspend</text><rect class="danger" x="28" y="612" width="334" height="52" rx="10"/><text class="b red" x="166" y="645">Revoke</text></g>
<g transform="translate(2090 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 25 · confirmation + focus</text><text class="h" x="28" y="164">Suspend access?</text><text class="b" x="28" y="207">Riley’s permissions for Dad</text><text class="b" x="28" y="235">will stop immediately.</text><rect class="c" x="28" y="270" width="334" height="116" rx="16"/><text class="s" x="48" y="309">History is preserved.</text><text class="s" x="48" y="341">No new authority is granted.</text><rect class="q" x="28" y="416" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="112" y="449">Suspend access</text><rect class="f" x="23" y="488" width="344" height="62" rx="15"/><rect class="sep" x="27" y="492" width="336" height="54" rx="13"/><rect class="c" x="28" y="493" width="334" height="52" rx="10"/><text class="b" x="132" y="526">Keep access</text></g>
<g transform="translate(2500 120)"><use href="#p"/><text class="s" x="28" y="122">Screen 26 · destructive confirmation</text><text class="h" x="28" y="164">Revoke access?</text><text class="b" x="28" y="207">This permanently ends Riley’s</text><text class="b" x="28" y="235">delegation for Dad.</text><rect class="q" x="28" y="295" width="334" height="52" rx="10"/><text class="w" fill="#FFFFFF" x="130" y="328">Keep access</text><rect x="28" y="367" width="334" height="52" rx="10" fill="#FFF" stroke="#A33A3A" stroke-width="2"/><text x="119" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#A33A3A">Revoke access</text><text class="s" x="28" y="459">Audit history remains filtered.</text></g></svg>
